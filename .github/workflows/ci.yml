name: CI

# Runs on every PR to main. Expands incrementally:
#   Commit 1  — placeholder (this file created, CI coverage from day one)
#   Commit 7  — lint step activated
#   Commit 11 — unit-tests step activated  ← HERE
#   Commit 15 — coverage gate + terraform-plan step activated

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install ruff==0.4.4 black==24.4.2

      - name: ruff check
        run: ruff check src/ tests/ config/

      - name: black check
        run: black --check src/ tests/ config/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short
