name: Deploy

# Runs only on direct pushes to main (i.e. after a PR is merged).
# Three sequential jobs: infrastructure → artifacts → Glue job update.
on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # 1. Apply infrastructure changes
  # -------------------------------------------------------------------------
  terraform-apply:
    name: Terraform Apply (dev)
    runs-on: ubuntu-latest
    environment: dev          # GitHub environment gate — requires reviewer approval in prod

    defaults:
      run:
        working-directory: infrastructure/environments/dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEV_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve

  # -------------------------------------------------------------------------
  # 2. Build the wheel and upload scripts to S3
  # -------------------------------------------------------------------------
  build-and-upload:
    name: Build Wheel & Upload Artifacts
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEV_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install build tool
        run: pip install build==1.2.1

      - name: Build wheel
        run: python -m build --wheel --outdir dist/

      - name: Upload wheel to S3 artifacts bucket
        run: |
          WHEEL=$(ls dist/lakehouse_ecommerce-*.whl | head -1)
          WHEEL_NAME=$(basename "$WHEEL")
          DEST="s3://lakehouse-artifacts-dev-${{ secrets.AWS_ACCOUNT_ID }}/libs/${WHEEL_NAME}"
          aws s3 cp "$WHEEL" "$DEST"
          echo "WHEEL_S3_PATH=${DEST}" >> "$GITHUB_ENV"
          echo "Uploaded wheel → ${DEST}"

      - name: Upload Glue scripts to S3
        run: |
          PREFIX="s3://lakehouse-artifacts-dev-${{ secrets.AWS_ACCOUNT_ID }}/scripts"
          aws s3 cp src/glue_jobs/products_job.py   "${PREFIX}/products_job.py"
          aws s3 cp src/glue_jobs/orders_job.py      "${PREFIX}/orders_job.py"
          aws s3 cp src/glue_jobs/order_items_job.py "${PREFIX}/order_items_job.py"
          echo "SCRIPTS_S3_PREFIX=${PREFIX}" >> "$GITHUB_ENV"
          echo "Uploaded scripts → ${PREFIX}/"

      - name: Upload archive Lambda
        run: |
          PREFIX="s3://lakehouse-artifacts-dev-${{ secrets.AWS_ACCOUNT_ID }}/lambda"
          aws s3 cp src/lambda/archive_handler.py "${PREFIX}/archive_handler.py"
          echo "Uploaded Lambda → ${PREFIX}/archive_handler.py"

  # -------------------------------------------------------------------------
  # 3. Point each Glue job at the freshly-uploaded script + wheel
  # -------------------------------------------------------------------------
  update-glue-jobs:
    name: Update Glue Job Definitions
    runs-on: ubuntu-latest
    needs: build-and-upload

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEV_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update Glue jobs to latest scripts and wheel
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          BUCKET="lakehouse-artifacts-dev-${ACCOUNT_ID}"
          SCRIPTS="s3://${BUCKET}/scripts"
          WHEEL="s3://${BUCKET}/libs/lakehouse_ecommerce-1.0.0-py3-none-any.whl"

          declare -A JOBS=(
            [products]="products_job.py"
            [orders]="orders_job.py"
            [order-items]="order_items_job.py"
          )

          for name in "${!JOBS[@]}"; do
            script="${JOBS[$name]}"
            job_name="lakehouse-dev-${name}-etl"
            echo "Updating ${job_name}..."
            aws glue update-job \
              --job-name "${job_name}" \
              --job-update "{
                \"Command\": {
                  \"Name\": \"glueetl\",
                  \"ScriptLocation\": \"${SCRIPTS}/${script}\",
                  \"PythonVersion\": \"3\"
                },
                \"DefaultArguments\": {
                  \"--extra-py-files\": \"${WHEEL}\"
                }
              }"
            echo "✓ ${job_name} updated"
          done
